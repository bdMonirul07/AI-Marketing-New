<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Marketing Platform — Task Status</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:28px 48px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
header h1 span{color:#58a6ff}
.badge{background:#21262d;border:1px solid #30363d;border-radius:20px;padding:5px 14px;font-size:12px;color:#8b949e}
main{max-width:1100px;margin:0 auto;padding:36px 48px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:36px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;text-align:center}
.stat .n{font-size:36px;font-weight:900;line-height:1}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#8b949e;margin-top:6px}
.done-n{color:#3fb950}.pend-n{color:#f78166}.total-n{color:#58a6ff}.pct-n{color:#d2a8ff}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{background:#21262d;border:1px solid #30363d;border-radius:20px;padding:6px 16px;font-size:12px;cursor:pointer;color:#8b949e;transition:all 0.15s}
.filter-btn:hover,.filter-btn.active{background:#58a6ff20;border-color:#58a6ff80;color:#58a6ff}
.filter-btn.f-done.active{background:#3fb95020;border-color:#3fb95080;color:#3fb950}
.filter-btn.f-pending.active{background:#f7816620;border-color:#f7816680;color:#f78166}

/* Search */
.search-wrap{margin-bottom:20px}
.search-wrap input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 16px;color:#e6edf3;font-size:13px;outline:none}
.search-wrap input:focus{border-color:#58a6ff60}
.search-wrap input::placeholder{color:#484f58}

/* Phase header */
.phase-header{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#8b949e;padding:8px 0;margin:20px 0 8px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between}
.phase-count{font-size:11px;color:#484f58}

/* Task row */
.task-row{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:4px;transition:background 0.1s;border:1px solid transparent}
.task-row:hover{background:#161b2280;border-color:#30363d}
.task-row.done .task-num{color:#3fb950}.task-row.pending .task-num{color:#f78166}
.task-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:600;color:#e6edf3;line-height:1.4}
.task-row.done .task-title{color:#8b949e;text-decoration:line-through;text-decoration-color:#484f58}
.task-meta{font-size:11px;color:#484f58;margin-top:3px}
.task-num{font-size:11px;font-weight:700;flex-shrink:0;min-width:52px;text-align:right}
.status-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-top:2px}
.chip-done{background:#3fb95015;border:1px solid #3fb95040;color:#3fb950}
.chip-pending{background:#f7816615;border:1px solid #f7816640;color:#f78166}
.chip-partial{background:#ffa65715;border:1px solid #ffa65740;color:#ffa657}

.hidden{display:none}
</style>
</head>
<body>
<header>
  <div>
    <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">AI Marketing Platform OS v4.0</div>
    <h1><span>Task</span> Status Report — April 16, 2026</h1>
  </div>
  <div style="display:flex;gap:8px">
    <div class="badge">✅ Done = Implemented & Verified</div>
    <div class="badge">🔴 Pending = Not Yet Built</div>
  </div>
</header>
<main>

<div class="stats">
  <div class="stat"><div class="n total-n" id="cnt-total">0</div><div class="l">Total Tasks</div></div>
  <div class="stat"><div class="n done-n" id="cnt-done">0</div><div class="l">Done</div></div>
  <div class="stat"><div class="n pend-n" id="cnt-pending">0</div><div class="l">Pending</div></div>
  <div class="stat"><div class="n pct-n" id="cnt-pct">0%</div><div class="l">Complete</div></div>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍  Search tasks..." oninput="filterTasks()"/>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All Tasks</button>
  <button class="filter-btn f-done" data-filter="done" onclick="setFilter(this,'done')">✅ Done Only</button>
  <button class="filter-btn f-pending" data-filter="pending" onclick="setFilter(this,'pending')">🔴 Pending Only</button>
</div>

<div id="task-list"></div>

</main>

let currentFilter = 'all';

function renderTasks() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('task-list');
  list.innerHTML = '';

  let total=0, done=0, pending=0;
  // Count all (ignoring partial in done)
  TASKS.forEach(t => {
    total++;
    if(t.status==='done') done++;
    else if(t.status==='pending') pending++;
  });
  const partial = total - done - pending;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-pending').textContent = pending + ' + ' + partial + ' partial';
  document.getElementById('cnt-pct').textContent = Math.round((done/total)*100) + '%';

  // Group by phase
  const phases = {};
  TASKS.forEach(t => {
    if(!phases[t.phase]) phases[t.phase]=[];
    const matchFilter = currentFilter==='all' || currentFilter===t.status || (currentFilter==='pending' && t.status==='partial');
    const matchSearch = !search || t.title.toLowerCase().includes(search) || t.id.toLowerCase().includes(search) || t.file.toLowerCase().includes(search);
    if(matchFilter && matchSearch) phases[t.phase].push(t);
  });

  Object.entries(phases).forEach(([phase, tasks]) => {
    if(tasks.length===0) return;
    const phDone = tasks.filter(t=>t.status==='done').length;
    const ph = document.createElement('div');
    ph.className='phase-header';
    ph.innerHTML = '<span>' + phase + '</span><span class="phase-count">' + phDone + ' / ' + tasks.length + ' done</span>';
    list.appendChild(ph);

    tasks.forEach(t => {
      const icon = t.status==='done' ? '✅' : t.status==='partial' ? '🟡' : '🔴';
      const chipCls = t.status==='done' ? 'chip-done' : t.status==='partial' ? 'chip-partial' : 'chip-pending';
      const chipTxt = t.status==='done' ? 'DONE' : t.status==='partial' ? 'PARTIAL' : 'PENDING';
      const row = document.createElement('div');
      row.className = 'task-row ' + (t.status==='done' ? 'done' : 'pending');
      row.innerHTML = '<span class="task-icon">' + icon + '</span>'
        + '<div class="task-body"><div class="task-title">' + t.title + '</div><div class="task-meta">' + t.file + '</div></div>'
        + '<span class="status-chip ' + chipCls + '">' + chipTxt + '</span>'
        + '<span class="task-num">' + t.id + '</span>';
      list.appendChild(row);
    });
  });
}

function setFilter(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderTasks();
}

function filterTasks() { renderTasks(); }

renderTasks();
</script>

</html>
