<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Marketer Platform OS V3.5</title>
  </head>
  <body class="bg-[#0B0E14] text-white">
    <div id="app" class="flex min-h-screen">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 bg-[#0F1219] border-r border-[#1F2430] flex flex-col">
        <div class="p-6">
          <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-600 bg-clip-text text-transparent">AI-Marketer</h1>
          <p class="text-xs text-gray-400">PLATFORM OS V3.5</p>
        </div>
        
        <nav id="nav-links" class="flex-1 px-4 space-y-2 mt-4">
          <!-- Dynamic Links based on role -->
        </nav>

        <div class="p-4 border-t border-[#1F2430]">
          <div id="user-info" class="flex items-center space-x-3 p-2 rounded-lg bg-[#151921]">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center font-bold" id="user-initial">
              E
            </div>
            <div>
              <p class="text-sm font-medium" id="user-name">Expert User</p>
              <p class="text-xs text-gray-500">ACTIVE SESSION</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-8 border-b border-[#1F2430] bg-[#0B0E14]/80 backdrop-blur-md sticky top-0 z-10">
          <div id="page-title" class="flex items-center space-x-2">
            <span class="text-xs tracking-widest text-cyan-400 font-semibold uppercase">AI PLATFORM OS V3.5</span>
            <span class="text-gray-600">/</span>
            <span id="current-page-name" class="font-bold text-xl uppercase tracking-wider">OBJECTIVE</span>
          </div>

          <div class="flex items-center space-x-6">
            <button class="relative p-2 text-gray-400 hover:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
              </svg>
              <span class="absolute top-2 right-2 w-2 h-2 bg-purple-500 rounded-full"></span>
            </button>

            <div class="relative group">
              <button id="role-switcher-btn" class="flex items-center space-x-3 bg-[#151921] px-4 py-2 rounded-xl border border-[#2A2F3A] hover:border-cyan-500 transition-all">
                <div class="text-right">
                  <p class="text-[10px] text-gray-400 uppercase tracking-tighter">Identity</p>
                  <p id="active-role-display" class="text-sm font-bold">Marketing Expert</p>
                </div>
                <div id="active-role-icon" class="w-8 h-8 rounded-full bg-cyan-900/50 flex items-center justify-center text-cyan-400 font-bold border border-cyan-500/30">
                  E
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
              </button>
              
              <!-- Role Switcher Dropdown -->
              <div id="role-dropdown" class="absolute right-0 mt-2 w-56 bg-[#151921] border border-[#2A2F3A] rounded-xl shadow-2xl hidden z-20 overflow-hidden">
                <div class="p-2 space-y-1">
                  <button class="role-option w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-cyan-500/10 hover:text-cyan-400 transition-all text-left" data-role="Expert">
                    <span class="w-8 h-8 rounded-full bg-cyan-900/50 flex items-center justify-center text-cyan-400 font-bold">E</span>
                    <span>Marketing Expert</span>
                  </button>
                  <button class="role-option w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-purple-500/10 hover:text-purple-400 transition-all text-left" data-role="Admin">
                    <span class="w-8 h-8 rounded-full bg-purple-900/50 flex items-center justify-center text-purple-400 font-bold">A</span>
                    <span>Platform Admin</span>
                  </button>
                  <button class="role-option w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-amber-500/10 hover:text-amber-400 transition-all text-left" data-role="CMO">
                    <span class="w-8 h-8 rounded-full bg-amber-900/50 flex items-center justify-center text-amber-400 font-bold">C</span>
                    <span>CMO Dashboard</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content-container" class="flex-1 overflow-y-auto p-8 bg-gradient-to-br from-[#0B0E14] via-[#0D1017] to-[#0B0E14]">
          <!-- Content injected via main.js -->
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
